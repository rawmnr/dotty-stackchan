site_name: Dotty
site_description: >-
  Your self-hosted StackChan robot assistant.
  Open-source firmware, local ASR/TTS, pluggable LLM brain — no cloud required.
site_url: https://brettkinny.github.io/dotty-stackchan
repo_url: https://github.com/BrettKinny/dotty-stackchan
repo_name: BrettKinny/dotty-stackchan

theme:
  name: material
  logo: assets/dotty-hero.svg
  favicon: assets/dotty-hero.svg
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search

nav:
  - Home: README.md
  - Getting Started: SETUP.md
  - Quickstart: quickstart.md
  - Architecture: architecture.md
  - Hardware:
      - Hardware: hardware.md
      - Hardware Support: hardware-support.md
  - Voice Pipeline: voice-pipeline.md
  - Voice Mode Entry: voice-mode-entry.md
  - Voice Catalog: voice-catalog.md
  - Wake Word: wake-word.md
  - Modes: modes.md
  - Proactive Greetings: proactive-greetings.md
  - Brain: brain.md
  - Protocols: protocols.md
  - OTA Verification: ota-verification.md
  - Kid Mode: kid-mode.md
  - LLM Backends: llm-backends.md
  - Observability: observability.md
  - Cookbook:
      - Change Persona: cookbook/change-persona.md
      - Swap Voice: cookbook/swap-voice.md
      - Run Fully Local: cookbook/run-fully-local.md
      - Add Emoji: cookbook/add-emoji.md
      - Disable Kid Mode: cookbook/disable-kid-mode.md
      - Concurrent Models (llama-swap): cookbook/llama-swap-concurrent-models.md
  - Advanced:
      - Variant port guide: advanced/variant-port-guide.md
  - Reference:
      - Emoji Mapping: emoji-mapping.md
      - Interaction Map: interaction-map.md
      - Latent Capabilities: latent-capabilities.md
      - References: references.md
  - Troubleshooting: troubleshooting.md
  - FAQ: faq.md
  - About: about.md
  - Roadmap: ROADMAP.md
  - Contributing: CONTRIBUTING.md
  - Style Guide: style.md
  - Security: SECURITY.md
  - Compatibility: COMPATIBILITY.md
  - SBOM: sbom.md
  - Signed Releases: signed-releases.md
  - Reproducible Builds: reproducible-builds.md
  - Versioning: versioning.md
  - Changelog: CHANGELOG.md

extra:
  version:
    provider: mike
    default: latest

markdown_extensions:
  - toc:
      permalink: true
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
