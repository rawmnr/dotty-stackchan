# dotty-behaviour — Unraid-resident successor to zeroclaw-bridge.
#
# Bind-mount layout under /mnt/user/appdata/dotty-behaviour/:
#   state/        — kid-mode, smart-mode, greeter_state.json, household.yaml
#   logs/         — daily NDJSON (conversation, scene-synth, dreams,
#                   dances, idle-perception, security cycles)
#   secrets/      — Google Calendar service-account JSON, OpenRouter key
#                   if not provided via env, etc.
#
# network_mode: host so the container can reach llama-swap (:8080) and
# xiaozhi-server (:8003 admin / :8000 ws) on loopback, and so the
# dashboard's host-status probes work without DNS gymnastics.
#
# Port 8090 (not the bridge's 8080) — llama-swap owns 8080 on Unraid.
# xiaozhi-server's VISION_BRIDGE_URL must point to
# http://<XIAOZHI_HOST>:8090 (the Unraid LAN IP — loopback works only
# if xiaozhi-server is also on host networking).

services:
  dotty-behaviour:
    image: dotty-behaviour:0.1.0
    container_name: dotty-behaviour
    network_mode: host
    restart: unless-stopped
    # Optional host-resident .env at $REMOTE_DIR/.env (Unraid:
    # /mnt/user/appdata/dotty-behaviour-src/.env). Stays out of the
    # deploy tar (only tracked files ship) and survives recreates.
    # Use for OPENROUTER_API_KEY / VISION_API_KEY / VLM_API_KEY etc.
    env_file:
      - path: .env
        required: false
    environment:
      - TZ=Australia/Brisbane
      - DOTTY_BEHAVIOUR_PORT=8090
      # xiaozhi-server admin endpoints (loopback on Unraid)
      - XIAOZHI_HOST=127.0.0.1
      - XIAOZHI_OTA_PORT=8003
      # llama-swap for narrative LLM (dreams, dance reflections, scene synth)
      - NARRATIVE_LLM_URL=http://127.0.0.1:8080/v1
      - NARRATIVE_MODEL=qwen3.6:27b-think
      - NARRATIVE_TIMEOUT_SEC=90
      # NDJSON log root
      - CONVO_LOG_DIR=/var/lib/dotty-behaviour/logs
      # Daemon state (kid-mode/smart-mode toggle files, greeter state,
      # household.yaml)
      - DOTTY_STATE_DIR=/var/lib/dotty-behaviour/state
      - HOUSEHOLD_YAML_PATH=/var/lib/dotty-behaviour/state/household.yaml
      - GREETER_STATE_PATH=/var/lib/dotty-behaviour/state/greeter_state.json
    volumes:
      - /mnt/user/appdata/dotty-behaviour/state:/var/lib/dotty-behaviour/state
      - /mnt/user/appdata/dotty-behaviour/logs:/var/lib/dotty-behaviour/logs
      - /mnt/user/appdata/dotty-behaviour/secrets:/var/lib/dotty-behaviour/secrets:ro
