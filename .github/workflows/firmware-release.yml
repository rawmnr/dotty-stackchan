# Build StackChan firmware and publish a GitHub Release.
#
# Triggered by tags matching fw-v* (e.g. fw-v1.0.0).
# Uses the Espressif IDF Docker container to build the ESP32-S3 firmware,
# then attaches the binaries + SHA256 checksums to a GitHub Release.
#
# NOTE: The build path (firmware/firmware/) assumes the submodule layout
# described in firmware/README.md. If the submodule structure changes after
# initial addition, the paths in this workflow may need adjustment.

name: Firmware Release

on:
  push:
    tags:
      - 'fw-v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Release
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.5.4

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v6
        with:
          submodules: recursive

      # The IDF container runs as root; GitHub's checkout creates the
      # workspace as a different user. Mark it safe so git operations
      # (version embedding, submodule queries) don't fail.
      - name: Mark workspace safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      # The firmware build depends on upstream repos (xiaozhi-esp32, etc.)
      # fetched by a helper script rather than git submodules.
      - name: Fetch firmware dependencies
        working-directory: firmware/firmware
        run: python fetch_repos.py

      # The espressif/idf container ships idf.py under /opt/esp/idf/tools/
      # but only puts it on PATH when /opt/esp/idf/export.sh is sourced.
      # GHA's default `sh -e` shell skips the container entrypoint that would
      # otherwise do this, so we source it ourselves.
      - name: Build firmware
        working-directory: firmware/firmware
        shell: bash
        run: |
          . /opt/esp/idf/export.sh
          idf.py build

      # Collect the three release binaries and generate checksums.
      # Build output lands in firmware/firmware/build/.
      # NOTE: generated_assets.bin is produced by the SPIFFS assets
      # partition build. If the partition layout changes, this path
      # may need updating.
      - name: Generate SHA256 checksums
        working-directory: firmware/firmware/build
        run: |
          sha256sum \
            stack-chan.bin \
            ota_data_initial.bin \
            generated_assets.bin \
            > SHA256SUMS.txt
          echo "--- checksums ---"
          cat SHA256SUMS.txt

      # ─── GPG signing (TODO: enable when GPG_PRIVATE_KEY secret is set) ───
      # See docs/signed-releases.md for the full setup. Required repo secrets:
      #   GPG_PRIVATE_KEY, GPG_PASSPHRASE, GPG_KEY_ID
      # Add the *.asc files to the Release `files:` block below once enabled.
      #
      # - name: Import GPG signing key
      #   if: ${{ secrets.GPG_PRIVATE_KEY != '' }}
      #   run: |
      #     echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
      #     echo "default-key ${GPG_KEY_ID}" >> ~/.gnupg/gpg.conf
      #   env:
      #     GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
      #
      # - name: Sign release artifacts
      #   if: ${{ secrets.GPG_PRIVATE_KEY != '' }}
      #   working-directory: firmware/firmware/build
      #   run: |
      #     for f in stack-chan.bin ota_data_initial.bin generated_assets.bin SHA256SUMS.txt; do
      #       gpg --batch --yes --pinentry-mode loopback \
      #           --passphrase "${{ secrets.GPG_PASSPHRASE }}" \
      #           --detach-sign --armor "$f"
      #     done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            firmware/firmware/build/stack-chan.bin
            firmware/firmware/build/ota_data_initial.bin
            firmware/firmware/build/generated_assets.bin
            firmware/firmware/build/SHA256SUMS.txt
            # Add once signing is enabled:
            # firmware/firmware/build/stack-chan.bin.asc
            # firmware/firmware/build/ota_data_initial.bin.asc
            # firmware/firmware/build/generated_assets.bin.asc
            # firmware/firmware/build/SHA256SUMS.txt.asc

  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [build-and-release]
    if: failure()
    steps:
      - name: Post Slack notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          REF: ${{ github.ref_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL not set, skipping Slack notification"
            exit 0
          fi
          payload=$(jq -cn --arg t ":x: *Firmware build failed* · \`${REPO}\` · \`${REF}\` — ${RUN_URL}" '{text: $t}')
          curl -fsS -X POST "$SLACK_WEBHOOK_URL" -H 'Content-Type: application/json' -d "$payload"
      - name: Post Discord notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          REF: ${{ github.ref_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL not set, skipping Discord notification"
            exit 0
          fi
          payload=$(jq -cn --arg c ":x: **Firmware build failed** · \`${REPO}\` · \`${REF}\` — ${RUN_URL}" '{content: $c}')
          curl -fsS -X POST "$DISCORD_WEBHOOK_URL" -H 'Content-Type: application/json' -d "$payload"
